<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scacchiera - Nicolò</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chess-page">
    <main class="chess-game" aria-labelledby="chess-title">
      <header class="chess-game__header">
        <div>
          <p class="eyebrow">Scacchi live</p>
          <h1 id="chess-title">Scacchiera</h1>
        </div>
        <a class="chess-top-link" href="/">Torna al sito</a>
      </header>

      <section class="chess-layout">
        <div class="chess-board-panel">
          <div class="player-strip player-strip--top">
            <span class="player-avatar" aria-hidden="true">♟</span>
            <strong>Nero</strong>
            <time>10:00</time>
          </div>

          <div class="chess-status" aria-live="polite">
            <span>Turno</span>
            <strong id="turnLabel">Bianco</strong>
            <p id="gameStatus">Seleziona un pezzo per iniziare.</p>
          </div>

          <div class="chess-board-wrap">
            <div class="chess-board" id="board" aria-label="Scacchiera giocabile"></div>
          </div>

          <div class="player-strip player-strip--bottom">
            <span class="player-avatar" aria-hidden="true">♙</span>
            <strong>Bianco</strong>
            <time>10:00</time>
          </div>
        </div>

        <aside class="chess-controls" aria-label="Controlli scacchiera">
          <nav class="chess-tabs" aria-label="Pannello scacchi">
            <button class="is-active" type="button" data-tab-button="analysis">Analisi</button>
            <button type="button" data-tab-button="moves">Mosse</button>
            <button type="button" data-tab-button="info">Info</button>
          </nav>

          <div class="control-group" data-tab-panel="analysis">
            <h2>Analisi</h2>
            <div class="analysis-grid" id="analysisPanel" aria-live="polite"></div>
          </div>

          <div class="control-group">
            <h2>Partita</h2>
            <div class="control-row">
              <button class="game-button game-button--primary" type="button" id="resetBtn">Reset</button>
              <button class="game-button" type="button" id="undoBtn">Undo</button>
              <button class="game-button" type="button" id="flipBtn">Gira</button>
            </div>
          </div>

          <div class="control-group" hidden data-tab-panel="moves">
            <h2>Mosse</h2>
            <ol class="move-history" id="moveHistory" aria-label="Cronologia mosse"></ol>
          </div>

          <div class="control-group" hidden data-tab-panel="info">
            <h2>Regole attive</h2>
            <p class="chess-note">Mosse legali, scacco, scacco matto, arrocco, en passant e promozione automatica a regina.</p>
          </div>
        </aside>
      </section>
    </main>

    <script src="chess.js"></script>
  </body>
</html>
